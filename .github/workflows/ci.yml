name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No cache: "npm" — template repo ships without a package-lock.json
      # so each fork can generate its own; setup-node's cache needs the
      # lockfile and fails otherwise. npm install (not ci) is used for
      # the same reason.
      - run: npm install --no-audit --no-fund
      - run: npm run lint --if-present
      - run: npm test
      - run: npm run build
